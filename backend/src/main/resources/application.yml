server:
  port: 18123
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8

spring:
  application:
    name: skillhub

  # PostgreSQL Datasource
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/skills_sharing}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true

  # Run schema.sql after JPA creates entity tables (for full-text search index)
  sql:
    init:
      mode: always

  # Caffeine Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  # GitHub OAuth2 Client
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,repo
            redirect-uri: ${BACKEND_URL:http://localhost:18123}/login/oauth2/code/github
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  expiration-days: 7

# GitHub API
github:
  api:
    base-url: https://api.github.com
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}

# Encryption key for storing GitHub access tokens
encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:}

# Application settings
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  backend-url: ${BACKEND_URL:http://localhost:18123}
