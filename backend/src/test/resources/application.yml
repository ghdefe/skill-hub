server:
  port: 8080

spring:
  application:
    name: agent-skills-sharing

  # H2 in-memory database for tests (PostgreSQL compatibility mode)
  datasource:
    url: "jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false

  # Disable schema.sql in tests (GIN index is PostgreSQL-specific)
  sql:
    init:
      mode: never

  # Caffeine Cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  # GitHub OAuth2 Client (dummy values for test context)
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: read:user,repo
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user

# JWT Configuration
jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256!!
  expiration-days: 7

# GitHub API
github:
  api:
    base-url: https://api.github.com
    webhook-secret: test-webhook-secret

# Encryption key for storing GitHub access tokens
encryption:
  secret-key: test-encryption-key-32-bytes-ok!

# Application settings
app:
  frontend-url: http://localhost:5173
